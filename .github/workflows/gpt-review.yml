name: GPT Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  review-script-safety-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout pull request content without secrets
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate project Python script syntax
        run: git ls-files -z '*.py' | xargs -0 -r python -m py_compile

  project-gpt-review:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout trusted review code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout pull request content
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run project GPT review
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PRIMARY_REVIEW_MODEL: ${{ vars.PRIMARY_REVIEW_MODEL || 'gpt-4.1-mini' }}
          FINAL_REVIEW_MODEL: ${{ vars.FINAL_REVIEW_MODEL || 'gpt-5.2' }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REVIEW_REPO_ROOT: ${{ github.workspace }}/pr
        run: python trusted/scripts/project_gpt_review.py

      - name: Upload review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-gpt-review
          path: |
            project_gpt_review.md
            project_gpt_review_metadata.json
          if-no-files-found: ignore
